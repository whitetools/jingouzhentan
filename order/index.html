<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>支付订单详情</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .highlight {
            color: #1890ff;
            font-size: 1.4em;
            font-weight: bold;
            margin: 10px 0;
        }
        .param-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .param-table th {
            background-color: #fafafa;
            padding: 12px;
            text-align: left;
            border: 1px solid #e8e8e8;
        }
        .param-table td {
            padding: 12px;
            border: 1px solid #e8e8e8;
        }
        .currency {
            font-family: monospace;
            color: #52c41a;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>支付订单验证</h1>
        <div class="info-block">
            <p>支付系统订单号：<span id="xddOrder" class="highlight">加载中...</span></p>
            <p>支付金额：<span id="amount" class="highlight currency">加载中...</span></p>
            <p>用户ID：<span id="userId" class="highlight">加载中...</span></p>
        </div>
        <button onclick="parseParams()" style="padding: 8px 15px; margin-top:10px;">刷新数据</button>
    </div>

    <div class="card">
        <h3>完整参数解析</h3>
        <table class="param-table" id="paramTable">
            <tr><th>参数名</th><th>参数值</th></tr>
        </table>
    </div>

    <script>
        function parseParams() {
            try {
                const referrer = document.referrer;
                if (!referrer) {
                    showError('无来源信息，请通过支付页面跳转访问');
                    return;
                }

                const url = new URL(referrer);
                const params = new URLSearchParams(url.search);

                // 核心参数解析
                updateField('xddOrder', params.get('xddpay_order'));
                updateCurrency('amount', params.get('money'));
                updateField('userId', params.get('user_id'));

                // 构建参数表格
                const table = document.getElementById('paramTable');
                table.innerHTML = `<tr><th>参数名</th><th>参数值</th></tr>`;
                
                params.forEach((value, key) => {
                    const decodedValue = decodeURIComponent(value);
                    table.innerHTML += `
                        <tr>
                            <td><strong>${key}</strong></td>
                            <td>${decodedValue}</td>
                        </tr>
                    `;
                });

            } catch (e) {
                showError('参数解析错误: ' + e.message);
            }
        }

        function updateField(elementId, value) {
            const element = document.getElementById(elementId);
            element.innerHTML = value || '<span style="color:#ff4d4f">未提供</span>';
        }

        function updateCurrency(elementId, value) {
            const element = document.getElementById(elementId);
            element.innerHTML = value ? `￥${parseFloat(value).toFixed(2)}` : '<span style="color:#ff4d4f">金额异常</span>';
        }

        function showError(message) {
            document.querySelector('.info-block').innerHTML = `
                <div style="color: #ff4d4f; padding: 15px; background: #fff1f0;">
                    ${message}
                </div>
            `;
        }

        // 初始加载
        parseParams();
        // 每3秒自动刷新
        setInterval(parseParams, 3000);
    </script>
</body>
</html>
