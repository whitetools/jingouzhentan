<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付结果 - 金狗侦探</title>
    <style>
        :root {
            --primary: #7C3AED;
            --surface: #FFFFFF;
            --background: #F8FAFC;
            --success: #27AE60;
            --text-primary: #2D3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .payment-card {
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(124, 58, 237, 0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .brand-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.5rem;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.15);
        }

        .title-group h1 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .transaction-details {
            margin: 2rem 0;
            background: #F9FAFB;
            border-radius: 16px;
            padding: 1.5rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .detail-label {
            color: #718096;
            font-size: 0.95rem;
            flex: 0 0 100px;
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            flex: 1;
        }

        .button-group {
            display: grid;
            gap: 1rem;
            margin-top: 2rem;
        }

        .action-btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), #6B46C1);
            color: white;
        }

        .secondary-btn {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .payment-card {
                padding: 1.8rem;
                border-radius: 20px;
            }

            .brand-avatar {
                width: 72px;
                height: 72px;
            }

            .title-group h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="brand-header">
            <img src="your-avatar.jpg" alt="金狗侦探" class="brand-avatar">
            <div class="title-group">
                <h1>支付结果确认</h1>
            </div>
        </div>

        <div class="transaction-details">
            <div class="detail-item">
                <span class="detail-label">支付时间</span>
                <span class="detail-value" id="currentTime">2023-08-20 14:30:45</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">支付单号</span>
                <span class="detail-value" id="xddOrder">2025082014304599</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">用户账号</span>
                <span class="detail-value" id="userId">JD_1234567</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">支付金额</span>
                <span class="detail-value" id="amount">¥ 299.00</span>
            </div>
        </div>

        <div class="button-group">
            <button class="action-btn primary-btn" onclick="location.href='https://whitetools.github.io/jingouzhentan/'">
                返回工具中心
            </button>
            <button class="action-btn secondary-btn" onclick="savePayment()">
                保存交易凭证
            </button>
        </div>
    </div>

    <script>
        // 动态数据注入
        function initPayment() {
            const params = new URLSearchParams(location.search);
            
            // 格式化时间
            const formatTime = (date) => {
                return new Intl.DateTimeFormat('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).format(date).replace(/\//g, '-');
            };

            document.getElementById('currentTime').textContent = formatTime(new Date());
            document.getElementById('xddOrder').textContent = params.get('xddpay_order') || '--';
            document.getElementById('userId').textContent = params.get('subject') ? 
                decodeURIComponent(params.get('subject')).match(/用户:(\d+)/)?.[1] || '--' : '--';
            document.getElementById('amount').textContent = params.get('money') ? 
                `¥ ${parseFloat(params.get('money')).toFixed(2)}` : '--';
        }

        // 保存功能
        function savePayment() {
            const content = `【金狗侦探交易凭证】
支付时间：${document.getElementById('currentTime').textContent}
支付单号：${document.getElementById('xddOrder').textContent}
用户账号：${document.getElementById('userId').textContent}
支付金额：${document.getElementById('amount').textContent}`;

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `交易凭证_${document.getElementById('xddOrder').textContent}.txt`;
            a.click();
            
            URL.revokeObjectURL(url);
        }

        window.addEventListener('DOMContentLoaded', initPayment);
    </script>
</body>
</html>
