<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单信息解析</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .highlight {
            color: #1890ff;
            font-size: 1.4em;
            font-weight: bold;
            margin: 10px 0;
        }
        .param-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .param-table th {
            background-color: #f1f3f5;
            padding: 12px;
            text-align: left;
        }
        .param-table td {
            padding: 12px;
            border-top: 1px solid #e9ecef;
        }
        .currency {
            color: #2b8a3e;
            font-family: monospace;
        }
        .warning {
            color: #c92a2a;
            background: #fff3bf;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>订单验证结果</h1>
        <div class="info-block">
            <p>商户订单号：<span id="orderNo" class="highlight">解析中...</span></p>
            <p>支付系统单号：<span id="xddOrder" class="highlight">解析中...</span></p>
            <p>支付金额：<span id="amount" class="highlight currency">解析中...</span></p>
            <p>用户ID：<span id="userId" class="highlight">解析中...</span></p>
            <p>支付结果：<span id="result" class="highlight">解析中...</span></p>
        </div>
        <button onclick="parseParams()" style="margin-top:15px; padding:8px 20px;">刷新验证</button>
    </div>

    <div class="card">
        <h3>完整参数解析</h3>
        <table class="param-table" id="paramTable">
            <tr><th>参数名</th><th>参数值</th></tr>
        </table>
    </div>

    <script>
        // 核心修正：使用当前页面URL而不是referrer
        function getUrlParams() {
            const currentUrl = window.location.href;
            const url = new URL(currentUrl);
            return new URLSearchParams(url.search);
        }

        function parseParams() {
            try {
                const params = getUrlParams();

                // 核心参数解析
                updateField('orderNo', params.get('order_no'));
                updateField('xddOrder', params.get('xddpay_order'));
                updateCurrency('amount', params.get('money'));
                updateField('result', params.get('result'));
                
                // 从subject参数解析用户ID
                const subject = params.get('subject') ? 
                    decodeURIComponent(params.get('subject')) : '';
                const userIdMatch = subject.match(/用户:(\d+)/);
                updateField('userId', userIdMatch ? userIdMatch[1] : null);

                // 构建参数表
                refreshParamTable(params);

            } catch (e) {
                showError(`解析失败: ${e.message}`);
            }
        }

        function updateField(elementId, value) {
            const element = document.getElementById(elementId);
            element.innerHTML = value || 
                `<span class="warning">未提供</span>`;
        }

        function updateCurrency(elementId, value) {
            const element = document.getElementById(elementId);
            const amount = parseFloat(value);
            element.innerHTML = value ? 
                `￥${amount.toFixed(2)}` : 
                `<span class="warning">金额异常</span>`;
        }

        function refreshParamTable(params) {
            const table = document.getElementById('paramTable');
            table.innerHTML = `<tr><th>参数名</th><th>参数值</th></tr>`;
            
            params.forEach((value, key) => {
                const row = table.insertRow();
                row.innerHTML = `
                    <td>${key}</td>
                    <td>${decodeURIComponent(value)}</td>
                `;
            });

            // 添加额外解析行
            const subject = params.get('subject') ? 
                decodeURIComponent(params.get('subject')) : '';
            if (subject) {
                const row = table.insertRow();
                row.innerHTML = `
                    <td>subject(解析后)</td>
                    <td>${subject}</td>
                `;
            }
        }

        function showError(msg) {
            document.body.innerHTML += `
                <div class="card warning">
                    ${msg}
                </div>
            `;
        }

        // 初始加载
        parseParams();
    </script>
</body>
</html>
